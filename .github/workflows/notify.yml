name: Daily Volunteer Alert

on:
  schedule:
    # 매일 아침 9시(한국시간)에 실행 (UTC 기준 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 패키지 설치
      run: pip install requests

    - name: 알림 스크립트 실행
      env:
        # 이곳에서 GitHub Secrets에 저장된 값을 파이썬 환경변수로 넘겨줍니다.
        API_KEY: ${{ secrets.API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python alert.py
